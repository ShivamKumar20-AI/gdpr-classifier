<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDPR Classifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2; --surface: #ffffff; --border: #d4d1ca; --divider: #e8e6e2;
    --text: #28251d; --muted: #7a7974; --faint: #bab9b4;
    --primary: #01696f; --primary-hover: #0c4e54; --primary-hi: #cedcd8;
    --success: #437a22; --success-hi: #d4dfcc;
    --warning: #964219; --warning-hi: #ddcfc6;
    --error: #a12c7b; --error-hi: #e0ced7;
    --critical: #c0392b; --critical-hi: #f5d5d2;
    --shadow: 0 4px 16px oklch(0.2 0.01 80 / 0.08);
    --radius: 0.75rem; --font: 'Inter', sans-serif; --display: 'Instrument Serif', serif;
    --transition: 180ms cubic-bezier(0.16,1,0.3,1);
  }
  [data-theme="dark"] {
    --bg: #171614; --surface: #1e1d1b; --border: #393836; --divider: #2a2927;
    --text: #cdccca; --muted: #797876; --faint: #5a5957;
    --primary: #4f98a3; --primary-hover: #227f8b; --primary-hi: #1e3435;
    --success: #6daa45; --success-hi: #243318;
    --warning: #bb653b; --warning-hi: #3a2216;
    --error: #d163a7; --error-hi: #3a1f30;
    --critical: #e05c4a; --critical-hi: #3a1a15;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; -webkit-font-smoothing: antialiased; }
  button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

  .page { max-width: 700px; margin: 0 auto; padding: clamp(1.5rem,5vw,3.5rem) clamp(1rem,4vw,2rem); }

  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
  .logo { font-family: var(--display); font-size: 1.25rem; display: flex; align-items: center; gap: 0.5rem; color: var(--text); }
  .logo-icon { color: var(--primary); }
  .tabs { display: flex; gap: 0.25rem; background: var(--divider); border-radius: 0.5rem; padding: 0.25rem; }
  .tab { padding: 0.35rem 0.875rem; border-radius: 0.375rem; font-size: 0.875rem; color: var(--muted); transition: all var(--transition); }
  .tab.active { background: var(--surface); color: var(--text); font-weight: 500; box-shadow: 0 1px 3px oklch(0.2 0.01 80/0.08); }
  .theme-btn { width: 34px; height: 34px; border-radius: 0.375rem; display: grid; place-items: center; color: var(--muted); }
  .theme-btn:hover { background: var(--divider); }

  .view { display: none; }
  .view.active { display: block; }

  /* Classify view */
  .hero { margin-bottom: 2rem; }
  .hero h1 { font-family: var(--display); font-size: clamp(1.75rem,4vw,2.5rem); line-height: 1.2; margin-bottom: 0.5rem; }
  .hero h1 em { color: var(--primary); font-style: italic; }
  .hero p { color: var(--muted); font-size: 0.9375rem; max-width: 50ch; }

  label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--faint); margin-bottom: 0.5rem; }
  textarea { width: 100%; min-height: 120px; resize: vertical; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1rem; font: inherit; font-size: 0.9375rem; color: var(--text); transition: border-color var(--transition), box-shadow var(--transition); }
  textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px oklch(from var(--primary) l c h / 0.15); }
  textarea::placeholder { color: var(--faint); }

  .row { display: flex; gap: 0.75rem; align-items: center; margin-top: 0.875rem; flex-wrap: wrap; }
  .btn-primary { background: var(--primary); color: #fff; padding: 0.6rem 1.375rem; border-radius: 0.5rem; font-size: 0.9375rem; font-weight: 500; transition: background var(--transition), box-shadow var(--transition); }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
  .chip-label { font-size: 0.8rem; color: var(--faint); }
  .chip { font-size: 0.8rem; padding: 0.2rem 0.65rem; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); background: var(--bg); transition: all var(--transition); }
  .chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-hi); }

  .result-card { margin-top: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.375rem; box-shadow: var(--shadow); display: none; animation: fadeUp 0.25s ease; }
  .result-card.show { display: block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .result-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; }
  .result-type { font-family: var(--display); font-size: 1.25rem; line-height: 1.2; }
  .badge { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.25rem 0.6rem; border-radius: 999px; white-space: nowrap; }
  .badge-Critical  { background: var(--critical-hi);  color: var(--critical); }
  .badge-High      { background: var(--warning-hi);   color: var(--warning); }
  .badge-Medium    { background: var(--primary-hi);   color: var(--primary); }
  .badge-Low       { background: var(--success-hi);   color: var(--success); }
  .hr { height: 1px; background: var(--divider); margin: 1rem 0; }
  .field-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--faint); margin-bottom: 0.25rem; }
  .field-value { font-size: 0.9375rem; color: var(--text); margin-bottom: 0.875rem; }
  .field-value.article { color: var(--primary); font-weight: 500; }

  .error-bar { display: none; margin-top: 1rem; padding: 0.75rem 1rem; background: var(--error-hi); color: var(--error); border-radius: 0.5rem; font-size: 0.9rem; }
  .error-bar.show { display: block; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* History view */
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .history-header h2 { font-family: var(--display); font-size: 1.5rem; }
  .btn-ghost { font-size: 0.875rem; color: var(--muted); padding: 0.4rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); }
  .history-list { display: flex; flex-direction: column; gap: 0.625rem; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.125rem; }
  .history-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 0.375rem; }
  .history-type { font-weight: 500; font-size: 0.9375rem; }
  .history-time { font-size: 0.75rem; color: var(--faint); white-space: nowrap; }
  .history-article { font-size: 0.8125rem; color: var(--primary); margin-bottom: 0.25rem; }
  .history-text { font-size: 0.8125rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .empty-history { text-align: center; padding: 3rem 1rem; color: var(--faint); font-size: 0.9375rem; }

  footer { margin-top: 3rem; padding-top: 1.25rem; border-top: 1px solid var(--divider); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; font-size: 0.8rem; color: var(--faint); }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--success); margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo">
      <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
      GDPR Classifier
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center">
      <div class="tabs">
        <button class="tab active" onclick="switchView('classify')">Classify</button>
        <button class="tab" onclick="switchView('history')">History</button>
      </div>
      <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Classify View -->
  <div class="view active" id="view-classify">
    <div class="hero">
      <h1>Classify <em>GDPR requests</em><br>instantly</h1>
      <p>Paste any data subject request and get the relevant article, action, and priority.</p>
    </div>

    <form id="form">
      <label for="txt">Request text</label>
      <textarea id="txt" placeholder="e.g. I want to know what personal data you hold about me." spellcheck="true"></textarea>
      <div class="row">
        <button type="submit" class="btn-primary" id="submitBtn">Classify</button>
        <div class="chips">
          <span class="chip-label">Try:</span>
          <button type="button" class="chip" data-text="I want to access all the data you hold about me.">SAR</button>
          <button type="button" class="chip" data-text="Please delete all my data and forget me.">Erasure</button>
          <button type="button" class="chip" data-text="We have had a data breach, customer data was leaked.">Breach</button>
          <button type="button" class="chip" data-text="I want to export my data in a portable format.">Portability</button>
          <button type="button" class="chip" data-text="An algorithm made a decision about me with no human review.">AI Decision</button>
        </div>
      </div>
    </form>

    <div class="error-bar" id="errorBar"></div>

    <div class="result-card" id="resultCard">
      <div class="result-top">
        <div class="result-type" id="rType"></div>
        <span class="badge" id="rBadge"></span>
      </div>
      <div class="hr"></div>
      <div class="field-label">GDPR Article</div>
      <div class="field-value article" id="rArticle"></div>
      <div class="field-label">Recommended Action</div>
      <div class="field-value" id="rAction"></div>
    </div>
  </div>

  <!-- History View -->
  <div class="view" id="view-history">
    <div class="history-header">
      <h2>Classification History</h2>
      <button class="btn-ghost" onclick="loadHistory()">↻ Refresh</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-history">No classifications yet.</div>
    </div>
  </div>

  <footer>
    <span><span class="dot"></span>localhost:8000</span>
    <span>GDPR Classifier v1.2</span>
  </footer>
</div>

<script>
  // Theme
  const html = document.documentElement;
  let theme = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  html.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', theme);
  });

  // Tabs
  function switchView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'history') loadHistory();
  }

  // Chips
  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => { document.getElementById('txt').value = c.dataset.text; });
  });

  // Classify
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = document.getElementById('txt').value.trim();
    if (!text) return;
    const btn = document.getElementById('submitBtn');
    const card = document.getElementById('resultCard');
    const err = document.getElementById('errorBar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Classifying…';
    card.classList.remove('show');
    err.classList.remove('show');
    try {
      const res = await fetch('/classify', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({text})
      });
      if (!res.ok) {
        const e = await res.json();
        throw new Error(e.detail || 'API error');
      }
      const d = await res.json();
      document.getElementById('rType').textContent = d.request_type;
      document.getElementById('rArticle').textContent = d.gdpr_article;
      document.getElementById('rAction').textContent = d.action;
      const badge = document.getElementById('rBadge');
      badge.textContent = d.priority;
      badge.className = 'badge badge-' + d.priority;
      card.classList.add('show');
    } catch(e) {
      err.textContent = e.message || 'Could not reach the API.';
      err.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Classify';
    }
  });

  // History
  async function loadHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '<div class="empty-history">Loading…</div>';
    try {
      const res = await fetch('/history?limit=50');
      const data = await res.json();
      if (!data.length) {
        list.innerHTML = '<div class="empty-history">No classifications yet.</div>';
        return;
      }
      list.innerHTML = data.map(r => `
        <div class="history-item">
          <div class="history-row">
            <span class="history-type">${r.request_type}</span>
            <span class="badge badge-${r.priority}">${r.priority}</span>
          </div>
          <div class="history-article">${r.gdpr_article}</div>
          <div class="history-time">${r.timestamp.replace('T',' ').slice(0,19)} UTC</div>
          <div class="history-text">"${r.input_text}"</div>
        </div>
      `).join('');
    } catch(e) {
      list.innerHTML = '<div class="empty-history">Could not load history.</div>';
    }
  }
</script>
</body>
</html>
